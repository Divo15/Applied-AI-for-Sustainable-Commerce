services:
  # ── Backend: Express API ─────────────────────────────────────────
  - type: web
    name: rayeva-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # Set this manually in Render dashboard (MongoDB Atlas URI)
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: FRONTEND_URL
        sync: false          # Set to your frontend Render URL e.g. https://rayeva-frontend.onrender.com

  # ── Frontend: React Static Site ──────────────────────────────────
  - type: web
    name: rayeva-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend Render URL e.g. https://rayeva-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
